name = "businessosbackend"
main = "src/index.ts"
compatibility_date = "2026-07-11"
compatibility_flags = ["nodejs_compat"]

# Edge-distributed by default — correct across the whole Workers fleet with
# no shared store needed, unlike the old in-memory Fastify rate limiter this
# replaces. `namespace_id` just needs to be a positive integer unique to this
# account; adjust if Cloudflare's current tooling wants a different value.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
[ratelimits.simple]
limit = 300
period = 60

# SUPABASE_URL / SUPABASE_ANON_KEY / SUPABASE_SERVICE_ROLE_KEY / ALLOWED_ORIGIN /
# RESEND_API_KEY are all set via `wrangler secret put <NAME>` (production) or
# `.dev.vars` (local dev, gitignored) — not here, so this file stays safe to commit.

# Not sensitive (it's the app's own public URL/from-address) — plain vars
# instead of secrets. PUBLIC_APP_URL is the `redirectTo` for employee invite
# emails; must also be allow-listed in Supabase Dashboard -> Authentication ->
# URL Configuration. EMAIL_FROM_ADDRESS must be on a domain verified with Resend.
[vars]
PUBLIC_APP_URL = "https://businessos.ovindupathiraja08.workers.dev"
EMAIL_FROM_ADDRESS = "Business OS <notifications@businessos.example.com>"
